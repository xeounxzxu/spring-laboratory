server.port=8082
spring.threads.virtual.enabled=false
spring.main.web-application-type=servlet
app.external.base-url=http://localhost:8083/mock
app.external.connect-timeout-ms=500
app.external.read-timeout-ms=3000
app.ping.base-url=http://localhost:8081
app.ping.path=/ping
app.ping.connect-timeout-ms=500
app.ping.read-timeout-ms=3000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=200
app.perf.mock.base-url=http://localhost:${server.port}/mock
app.perf.mock.connect-timeout-ms=500
app.perf.mock.read-timeout-ms=3000
